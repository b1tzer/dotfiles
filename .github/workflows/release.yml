name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject placeholders
        run: |
          REPO_URL="https://github.com/${{ github.repository }}.git"
          GITHUB_USERNAME="${{ github.repository_owner }}"
          
          sed -i "s|__DOTFILES_REPO__|${REPO_URL}|g" install.sh
          sed -i "s|__GITHUB_USERNAME__|${GITHUB_USERNAME}|g" README.md
          
          echo "Injected repository URL: ${REPO_URL}"
          echo "Injected GitHub username: ${GITHUB_USERNAME}"
          
          # 验证占位符已被成功替换，否则以非零退出码终止
          if grep -q "__DOTFILES_REPO__" install.sh; then
            echo "ERROR: __DOTFILES_REPO__ placeholder was not replaced in install.sh" >&2
            exit 1
          fi
          if grep -q "__GITHUB_USERNAME__" README.md; then
            echo "ERROR: __GITHUB_USERNAME__ placeholder was not replaced in README.md" >&2
            exit 1
          fi
          echo "Placeholder verification passed."

      - name: Upload files to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.sh
            README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

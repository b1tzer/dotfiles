# Starship prompt configuration
# https://starship.rs/config/

# Timeout for commands (ms)
command_timeout = 1000

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo  = true

[git_branch]
symbol = " "
style  = "bold purple"

[git_status]
conflicted = "⚡"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
untracked  = "?"
modified   = "!"
staged     = "+"
renamed    = "»"
deleted    = "✘"

[nodejs]
symbol = " "

[python]
symbol = " "

[docker_context]
symbol = " "

[time]
disabled = false
format   = "[$time]($style) "
style    = "dimmed white"

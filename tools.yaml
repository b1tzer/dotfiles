# =============================================================================
# tools.yaml - Development Environment Tool Manifest
# =============================================================================
# Declare all tools you want to manage across machines.
# Supported platforms: ubuntu, macos, windows
# Install methods: apt, brew, winget, choco, script, manual
#
# Field reference:
#   name         - Tool identifier (used for installed-check via `command -v`)
#   description  - Brief description of the tool
#   check_cmd    - Command to verify installation (default: same as name)
#   platforms    - Per-platform install configuration
#     install    - Install command or package name
#     method     - Package manager: apt | brew | winget | choco | script | manual
#     script     - Path to install script (when method=script)
#   version      - (optional) Pinned version string
#   deprecated   - (optional) Mark tool as deprecated, default: false
#   replaced_by  - (optional) Name of the replacement tool
#   migration_note - (optional) Instructions for migrating from deprecated tool
# =============================================================================

tools:

  # ---------------------------------------------------------------------------
  # Shell & Terminal
  # ---------------------------------------------------------------------------
  - name: zsh
    description: "Z shell - feature-rich interactive shell"
    platforms:
      ubuntu:
        method: apt
        install: zsh
      macos:
        method: brew
        install: zsh
      windows:
        method: manual
        install: "Install via WSL or Git Bash"

  - name: starship
    description: "Cross-shell prompt - fast and customizable"
    platforms:
      ubuntu:
        method: script
        script: "https://starship.rs/install.sh"
        script_args: "--yes"
      macos:
        method: brew
        install: starship
      windows:
        method: winget
        install: Starship.Starship

  # ---------------------------------------------------------------------------
  # Version Control
  # ---------------------------------------------------------------------------
  - name: git
    description: "Distributed version control system"
    platforms:
      ubuntu:
        method: apt
        install: git
      macos:
        method: brew
        install: git
      windows:
        method: winget
        install: Git.Git

  - name: gh
    description: "GitHub CLI"
    platforms:
      ubuntu:
        method: apt
        install: gh
      macos:
        method: brew
        install: gh
      windows:
        method: winget
        install: GitHub.cli

  # ---------------------------------------------------------------------------
  # Container & Virtualization
  # ---------------------------------------------------------------------------
  - name: docker
    description: "Container platform"
    check_cmd: docker
    platforms:
      ubuntu:
        method: script
        script: "https://get.docker.com"
      macos:
        method: brew
        install: "--cask docker"
      windows:
        method: winget
        install: Docker.DockerDesktop

  # ---------------------------------------------------------------------------
  # Language Runtimes & Version Managers
  # ---------------------------------------------------------------------------
  - name: mise
    description: "Polyglot runtime version manager (replaces nvm/pyenv/rustup etc.)"
    check_cmd: mise
    platforms:
      ubuntu:
        method: script
        script: "https://mise.run"
      macos:
        method: brew
        install: mise
      windows:
        method: winget
        install: jdx.mise
    runtimes:
      - name: java
        version: latest
      - name: python
        version: latest
      - name: node
        version: lts
      - name: rust
        version: latest
      - name: cmake
        version: latest

  # ---------------------------------------------------------------------------
  # CLI Utilities
  # ---------------------------------------------------------------------------
  - name: fzf
    description: "Fuzzy finder for the command line"
    platforms:
      ubuntu:
        method: apt
        install: fzf
      macos:
        method: brew
        install: fzf
      windows:
        method: winget
        install: junegunn.fzf

  - name: ripgrep
    description: "Fast grep replacement (rg)"
    check_cmd: rg
    platforms:
      ubuntu:
        method: apt
        install: ripgrep
      macos:
        method: brew
        install: ripgrep
      windows:
        method: winget
        install: BurntSushi.ripgrep.MSVC

  - name: bat
    description: "cat with syntax highlighting"
    platforms:
      ubuntu:
        method: apt
        install: bat
      macos:
        method: brew
        install: bat
      windows:
        method: winget
        install: sharkdp.bat

  - name: eza
    description: "Modern replacement for ls (successor to exa)"
    platforms:
      ubuntu:
        method: script
        script: "https://raw.githubusercontent.com/eza-community/eza/main/deb.asc"
        install_type: eza_deb
      macos:
        method: brew
        install: eza
      windows:
        method: winget
        install: eza-community.eza

  - name: yazi
    description: "Blazing fast terminal file manager written in Rust"
    platforms:
      ubuntu:
        method: script
        script: "https://github.com/sxyazi/yazi/releases/latest/download/yazi-x86_64-unknown-linux-musl.zip"
        install_type: zip_binary
        binary: yazi
      macos:
        method: brew
        install: yazi
      windows:
        method: winget
        install: sxyazi.yazi

  - name: zellij
    description: "Terminal workspace and multiplexer"
    platforms:
      ubuntu:
        method: script
        script: "https://github.com/zellij-org/zellij/releases/latest/download/zellij-x86_64-unknown-linux-musl.tar.gz"
        install_type: tar_binary
        binary: zellij
      macos:
        method: brew
        install: zellij
      windows:
        method: manual
        install: "Use WSL for zellij on Windows"

  - name: fd
    description: "Simple, fast and user-friendly alternative to find"
    check_cmd: fd
    platforms:
      ubuntu:
        method: apt
        install: fd-find
      macos:
        method: brew
        install: fd
      windows:
        method: winget
        install: sharkdp.fd

  - name: tmux
    description: "Terminal multiplexer"
    platforms:
      ubuntu:
        method: apt
        install: tmux
      macos:
        method: brew
        install: tmux
      windows:
        method: manual
        install: "Use WSL for tmux on Windows"

  - name: jq
    description: "Command-line JSON processor"
    platforms:
      ubuntu:
        method: apt
        install: jq
      macos:
        method: brew
        install: jq
      windows:
        method: winget
        install: jqlang.jq

  - name: curl
    description: "Data transfer tool"
    platforms:
      ubuntu:
        method: apt
        install: curl
      macos:
        method: brew
        install: curl

  - name: wget
    description: "Non-interactive network downloader"
    platforms:
      ubuntu:
        method: apt
        install: wget
      macos:
        method: brew
        install: wget

  # ---------------------------------------------------------------------------
  # Terminal Emulators (macOS only)
  # ---------------------------------------------------------------------------
  - name: ghostty
    description: "Fast, feature-rich, cross-platform terminal emulator"
    platforms:
      macos:
        method: brew
        install: "--cask ghostty"

  - name: iterm2
    description: "macOS terminal replacement with advanced features"
    check_cmd: "[ -d /Applications/iTerm.app ] || [ -d $HOME/Applications/iTerm.app ]"
    platforms:
      macos:
        method: brew
        install: "--cask iterm2"

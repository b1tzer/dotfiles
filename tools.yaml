# =============================================================================
# tools.yaml - Development Environment Tool Manifest
# =============================================================================
# Declare all tools you want to manage across machines.
# Supported platforms: ubuntu, macos, windows
# Install methods: apt, brew, winget, choco, script, manual
#
# Field reference:
#   name         - Tool identifier (used for installed-check via `command -v`)
#   description  - Brief description of the tool
#   check_cmd    - Command to verify installation (default: same as name)
#   platforms    - Per-platform install configuration
#     install    - Install command or package name
#     method     - Package manager: apt | brew | winget | choco | script | manual
#     script     - Path to install script (when method=script)
#   version      - (optional) Pinned version string
#   deprecated   - (optional) Mark tool as deprecated, default: false
#   replaced_by  - (optional) Name of the replacement tool
#   migration_note - (optional) Instructions for migrating from deprecated tool
# =============================================================================

tools:

  # ---------------------------------------------------------------------------
  # Shell & Terminal
  # ---------------------------------------------------------------------------
  - name: zsh
    description: "Z shell - feature-rich interactive shell"
    platforms:
      ubuntu:
        method: apt
        install: zsh
      macos:
        method: brew
        install: zsh
      windows:
        method: manual
        install: "Install via WSL or Git Bash"

  - name: starship
    description: "Cross-shell prompt - fast and customizable"
    platforms:
      ubuntu:
        method: script
        script: "https://starship.rs/install.sh"
        script_args: "--yes"
      macos:
        method: brew
        install: starship
      windows:
        method: winget
        install: Starship.Starship

  # ---------------------------------------------------------------------------
  # Version Control
  # ---------------------------------------------------------------------------
  - name: git
    description: "Distributed version control system"
    platforms:
      ubuntu:
        method: apt
        install: git
      macos:
        method: brew
        install: git
      windows:
        method: winget
        install: Git.Git

  - name: gh
    description: "GitHub CLI"
    platforms:
      ubuntu:
        method: apt
        install: gh
      macos:
        method: brew
        install: gh
      windows:
        method: winget
        install: GitHub.cli

  # ---------------------------------------------------------------------------
  # Container & Virtualization
  # ---------------------------------------------------------------------------
  - name: docker
    description: "Container platform"
    check_cmd: docker
    platforms:
      ubuntu:
        method: script
        script: "https://get.docker.com"
      macos:
        method: brew
        install: "--cask docker"
      windows:
        method: winget
        install: Docker.DockerDesktop

  # ---------------------------------------------------------------------------
  # Language Runtimes & Version Managers
  # ---------------------------------------------------------------------------
  - name: mise
    description: "Polyglot runtime version manager (replaces nvm/pyenv/rustup etc.)"
    check_cmd: mise
    platforms:
      ubuntu:
        method: script
        script: "https://mise.run"
      macos:
        method: brew
        install: mise
      windows:
        method: winget
        install: jdx.mise
    runtimes:
      - name: java
        version: latest
      - name: python
        version: latest
      - name: node
        version: lts
      - name: rust
        version: latest
      - name: cmake
        version: latest

  # ---------------------------------------------------------------------------
  # CLI Utilities
  # ---------------------------------------------------------------------------
  - name: fzf
    description: "Fuzzy finder for the command line"
    platforms:
      ubuntu:
        method: apt
        install: fzf
      macos:
        method: brew
        install: fzf
      windows:
        method: winget
        install: junegunn.fzf

  - name: ripgrep
    description: "Fast grep replacement (rg)"
    check_cmd: rg
    platforms:
      ubuntu:
        method: apt
        install: ripgrep
      macos:
        method: brew
        install: ripgrep
      windows:
        method: winget
        install: BurntSushi.ripgrep.MSVC

  - name: bat
    description: "cat with syntax highlighting"
    platforms:
      ubuntu:
        method: apt
        install: bat
      macos:
        method: brew
        install: bat
      windows:
        method: winget
        install: sharkdp.bat

  - name: eza
    description: "Modern replacement for ls (successor to exa)"
    platforms:
      ubuntu:
        method: script
        script: "https://raw.githubusercontent.com/eza-community/eza/main/deb.asc"
        install_type: eza_deb
      macos:
        method: brew
        install: eza
      windows:
        method: winget
        install: eza-community.eza

  - name: yazi
    description: "Blazing fast terminal file manager written in Rust"
    platforms:
      ubuntu:
        method: script
        script: "https://github.com/sxyazi/yazi/releases/latest/download/yazi-x86_64-unknown-linux-musl.zip"
        install_type: zip_binary
        binary: yazi
      macos:
        method: brew
        install: yazi
      windows:
        method: winget
        install: sxyazi.yazi

  - name: zellij
    description: "Terminal workspace and multiplexer"
    platforms:
      ubuntu:
        method: script
        script: "https://github.com/zellij-org/zellij/releases/latest/download/zellij-x86_64-unknown-linux-musl.tar.gz"
        install_type: tar_binary
        binary: zellij
      macos:
        method: brew
        install: zellij
      windows:
        method: manual
        install: "Use WSL for zellij on Windows"

  - name: fd
    description: "Simple, fast and user-friendly alternative to find"
    check_cmd: fd
    platforms:
      ubuntu:
        method: apt
        install: fd-find
      macos:
        method: brew
        install: fd
      windows:
        method: winget
        install: sharkdp.fd

  - name: tmux
    description: "Terminal multiplexer"
    platforms:
      ubuntu:
        method: apt
        install: tmux
      macos:
        method: brew
        install: tmux
      windows:
        method: manual
        install: "Use WSL for tmux on Windows"

  - name: jq
    description: "Command-line JSON processor"
    platforms:
      ubuntu:
        method: apt
        install: jq
      macos:
        method: brew
        install: jq
      windows:
        method: winget
        install: jqlang.jq

  - name: curl
    description: "Data transfer tool"
    platforms:
      ubuntu:
        method: apt
        install: curl
      macos:
        method: brew
        install: curl

  - name: wget
    description: "Non-interactive network downloader"
    platforms:
      ubuntu:
        method: apt
        install: wget
      macos:
        method: brew
        install: wget

  # ---------------------------------------------------------------------------
  # Terminal Emulators (macOS only)
  # ---------------------------------------------------------------------------
  - name: ghostty
    description: "Fast, feature-rich, cross-platform terminal emulator"
    platforms:
      macos:
        method: brew
        install: "--cask ghostty"

  - name: iterm2
    description: "macOS terminal replacement with advanced features"
    check_cmd: "[ -d /Applications/iTerm.app ] || [ -d $HOME/Applications/iTerm.app ]"
    platforms:
      macos:
        method: brew
        install: "--cask iterm2"

  # ---------------------------------------------------------------------------
  # Git Workflow Enhancement
  # ---------------------------------------------------------------------------
  - name: lazygit
    description: "Terminal UI for git commands"
    platforms:
      ubuntu:
        method: apt
        install: lazygit
      macos:
        method: brew
        install: lazygit
      windows:
        method: winget
        install: JesseDuffield.lazygit

  - name: delta
    description: "A syntax-highlighting pager for git, diff, and grep output"
    check_cmd: delta
    platforms:
      ubuntu:
        method: apt
        install: git-delta
      macos:
        method: brew
        install: git-delta
      windows:
        method: winget
        install: dandavison.delta

  - name: git-lfs
    description: "Git extension for versioning large files"
    check_cmd: git-lfs
    platforms:
      ubuntu:
        method: apt
        install: git-lfs
      macos:
        method: brew
        install: git-lfs
      windows:
        method: winget
        install: GitHub.GitLFS

  # ---------------------------------------------------------------------------
  # System Monitoring & Process Management
  # ---------------------------------------------------------------------------
  - name: btop
    description: "Resource monitor - modern top/htop replacement"
    platforms:
      ubuntu:
        method: apt
        install: btop
      macos:
        method: brew
        install: btop
      windows:
        method: winget
        install: aristocratos.btop4win

  - name: dust
    description: "A more intuitive version of du written in rust"
    platforms:
      ubuntu:
        method: script
        script: "https://github.com/bootandy/dust/releases/latest/download/dust-x86_64-unknown-linux-musl.tar.gz"
        install_type: tar_binary
        binary: dust
      macos:
        method: brew
        install: dust
      windows:
        method: winget
        install: bootandy.dust

  - name: procs
    description: "A modern replacement for ps written in Rust"
    platforms:
      ubuntu:
        method: script
        script: "https://github.com/dalance/procs/releases/latest/download/procs-v0.14.9-x86_64-linux.zip"
        install_type: zip_binary
        binary: procs
      macos:
        method: brew
        install: procs
      windows:
        method: winget
        install: dalance.procs

  # ---------------------------------------------------------------------------
  # Network Debugging
  # ---------------------------------------------------------------------------
  - name: xh
    description: "Friendly and fast tool for sending HTTP requests (httpie alternative)"
    platforms:
      ubuntu:
        method: script
        script: "https://github.com/ducaale/xh/releases/latest/download/xh-x86_64-unknown-linux-musl.tar.gz"
        install_type: tar_binary
        binary: xh
      macos:
        method: brew
        install: xh
      windows:
        method: winget
        install: ducaale.xh

  - name: dog
    description: "A command-line DNS client (dig replacement)"
    platforms:
      ubuntu:
        method: script
        script: "https://github.com/ogham/dog/releases/latest/download/dog-v0.1.0-x86_64-unknown-linux-gnu.zip"
        install_type: zip_binary
        binary: dog
      macos:
        method: brew
        install: dog

  - name: bandwhich
    description: "Terminal bandwidth utilization tool"
    platforms:
      ubuntu:
        method: script
        script: "https://github.com/imsnif/bandwhich/releases/latest/download/bandwhich-v0.23.1-x86_64-unknown-linux-musl.tar.gz"
        install_type: tar_binary
        binary: bandwhich
      macos:
        method: brew
        install: bandwhich
      windows:
        method: winget
        install: imsnif.bandwhich

  # ---------------------------------------------------------------------------
  # Developer Productivity
  # ---------------------------------------------------------------------------
  - name: zoxide
    description: "A smarter cd command, inspired by z and autojump"
    platforms:
      ubuntu:
        method: apt
        install: zoxide
      macos:
        method: brew
        install: zoxide
      windows:
        method: winget
        install: ajeetdsouza.zoxide

  - name: atuin
    description: "Magical shell history - sync, search and backup shell history"
    platforms:
      ubuntu:
        method: script
        script: "https://setup.atuin.sh"
        script_args: ""
      macos:
        method: brew
        install: atuin
      windows:
        method: winget
        install: atuinsh.atuin

  - name: tealdeer
    description: "A very fast implementation of tldr in Rust (command: tldr)"
    check_cmd: tldr
    platforms:
      ubuntu:
        method: script
        script: "https://github.com/dbrgn/tealdeer/releases/latest/download/tealdeer-linux-x86_64-musl"
        install_type: single_binary
        binary: tldr
      macos:
        method: brew
        install: tealdeer
      windows:
        method: winget
        install: dbrgn.tealdeer

  - name: navi
    description: "An interactive cheatsheet tool for the command-line"
    platforms:
      ubuntu:
        method: script
        script: "https://raw.githubusercontent.com/denisidoro/navi/master/scripts/install"
        script_args: ""
      macos:
        method: brew
        install: navi
      windows:
        method: winget
        install: denisidoro.navi

  - name: tokei
    description: "Count your code, quickly"
    platforms:
      ubuntu:
        method: script
        script: "https://github.com/XAMPPRocky/tokei/releases/latest/download/tokei-x86_64-unknown-linux-musl.tar.gz"
        install_type: tar_binary
        binary: tokei
      macos:
        method: brew
        install: tokei
      windows:
        method: winget
        install: XAMPPRocky.tokei

  - name: hyperfine
    description: "A command-line benchmarking tool"
    platforms:
      ubuntu:
        method: apt
        install: hyperfine
      macos:
        method: brew
        install: hyperfine
      windows:
        method: winget
        install: sharkdp.hyperfine
